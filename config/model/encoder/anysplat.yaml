defaults:
  - backbone: croco

name: anysplat

opacity_mapping:
  initial: 0.0
  final: 0.0
  warm_up: 1

num_monocular_samples: 32
num_surfaces: 1
predict_opacity: false

gaussians_per_pixel: 1

gaussian_adapter:
  gaussian_scale_min: 0.5
  gaussian_scale_max: 15.0
  sh_degree: 0

d_feature: 32

visualizer:
  num_samples: 8
  min_resolution: 256
  export_ply: false

apply_bounds_shim: true

gs_params_head_type: dpt_gs
pose_free: true
pretrained_weights: ""
scale_align: false

voxel_size: 0.001
n_offsets: 2
anchor_feat_dim: 83 # 32
add_view: false
color_attr: 3D # 3D or RGB
mlp_type: unified
scaffold: true

# Scene Query GS Head (anchor-based, decoupled from view count)
use_scene_query: false
num_scene_queries: 8192
scene_query_hidden_dim: 256
scene_query_num_layers: 4
scene_query_head_dim: 128
num_fourier_frequencies: 6
scene_token_latent_dim: 64
n_anchor_offset: 4